<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tweet2md</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="logo-row">
        <img src="icons/icon-48.png" alt="tweet2md" class="logo-icon" />
        <h1 class="logo-text">tweet<span class="accent">2md</span></h1>
      </div>
      <p class="tagline" data-i18n="tagline">Convert threads &amp; articles to Markdown</p>
      <p class="hint" data-i18n="footer_hint">Open a tweet or article on X.com to get started</p>
    </header>

    <main class="popup-main" id="view-main">
      <div class="btn-group">
        <button id="btn-download" class="btn-primary btn-action" type="button">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          <span class="btn-label" data-i18n="btn_download">Download .md</span>
        </button>
        <button id="btn-copy" class="btn-secondary btn-action" type="button">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
          </svg>
          <span class="btn-label" data-i18n="btn_copy">Copy .md</span>
        </button>
      </div>

      <button id="btn-obsidian" class="btn-obsidian btn-action" type="button">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2 2 7l10 5 10-5-10-5z" />
          <path d="m2 17 10 5 10-5" />
          <path d="m2 12 10 5 10-5" />
        </svg>
        <span class="btn-text-stack">
          <span class="btn-label" data-i18n="btn_obsidian">Add to Obsidian</span>
          <span class="btn-sub" data-i18n="btn_obsidian_hint">Long threads or images? Use Download .md instead</span>
        </span>
      </button>

      <div class="options">
        <div class="option-group">
          <div class="option-group-label" data-i18n="group_export">Export</div>
          <label class="toggle-label" title="Download images to a folder next to the markdown file" data-i18n-title="opt_save_images_title">
            <span class="toggle-text">
              <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <polyline points="21 15 16 10 5 21" />
              </svg>
              <span data-i18n="opt_save_images">Save images locally</span>
            </span>
            <input type="checkbox" id="chk-download-images" class="toggle-input" />
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-label" title="Render likes, reposts, replies, bookmarks, and views as a row in the Markdown body" data-i18n-title="opt_inline_stats_title">
            <span class="toggle-text">
              <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
              </svg>
              <span data-i18n="opt_inline_stats">Show engagement stats inline</span>
            </span>
            <input type="checkbox" id="chk-inline-stats" class="toggle-input" />
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-label" title="Add likes, reposts, views as YAML frontmatter" data-i18n-title="opt_metadata_title">
            <span class="toggle-text">
              <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
              </svg>
              <span data-i18n="opt_metadata">Include metadata</span>
            </span>
            <input type="checkbox" id="chk-include-metadata" class="toggle-input" />
            <span class="toggle-switch"></span>
          </label>
        </div>
      </div>

      <button id="btn-settings" class="nav-link" type="button">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
        <span data-i18n="nav_settings">Settings</span>
        <span class="nav-arrow">→</span>
      </button>

      <div id="status" class="status hidden"></div>
    </main>

    <main class="popup-main hidden" id="view-settings">
      <button id="btn-back" class="nav-link nav-back" type="button">
        <span class="nav-arrow">←</span>
        <span data-i18n="nav_back">Back</span>
      </button>

      <div class="options">
        <div class="option-group">
          <div class="option-group-label" data-i18n="group_obsidian">Obsidian</div>
          <label class="toggle-label" title="Emit frontmatter optimized for Obsidian: wikilink author, tags, published/created dates" data-i18n-title="opt_obsidian_friendly_title">
            <span class="toggle-text">
              <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2 2 7l10 5 10-5-10-5z" />
                <path d="m2 17 10 5 10-5" />
                <path d="m2 12 10 5 10-5" />
              </svg>
              <span data-i18n="opt_obsidian_friendly">Obsidian-friendly frontmatter</span>
            </span>
            <input type="checkbox" id="chk-obsidian-friendly" class="toggle-input" />
            <span class="toggle-switch"></span>
          </label>
          <label class="field-label" title="Used by the 'Add to Obsidian' button. Leave blank to let Obsidian pick the last-used vault." data-i18n-title="opt_obsidian_vault_title">
            <span class="field-text" data-i18n="opt_obsidian_vault">Vault name</span>
            <input type="text" id="txt-obsidian-vault" class="field-input" autocomplete="off" spellcheck="false" placeholder="(optional)" data-i18n-placeholder="opt_obsidian_vault_placeholder" />
          </label>
        </div>

        <div class="option-group">
          <div class="option-group-label" data-i18n="group_inline">Inline button &amp; context menu</div>
          <label class="toggle-label" title="Add a download button next to share on each tweet's action bar" data-i18n-title="opt_show_inline_title">
            <span class="toggle-text">
              <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
              </svg>
              <span data-i18n="opt_show_inline">Show inline button on tweets</span>
            </span>
            <input type="checkbox" id="chk-show-inline" class="toggle-input" />
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-label" title="When enabled, the inline icon on each tweet copies markdown to the clipboard instead of downloading a file" data-i18n-title="opt_inline_copies_title">
            <span class="toggle-text">
              <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
              </svg>
              <span data-i18n="opt_inline_copies">Inline button copies instead</span>
            </span>
            <input type="checkbox" id="chk-inline-copies" class="toggle-input" />
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-label" title="Close the tab automatically after exporting from a tweet's inline button or right-click menu" data-i18n-title="opt_close_tab_title">
            <span class="toggle-text">
              <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
              </svg>
              <span data-i18n="opt_close_tab">Close tab after export</span>
            </span>
            <input type="checkbox" id="chk-close-tab" class="toggle-input" />
            <span class="toggle-switch"></span>
          </label>
        </div>
      </div>
    </main>

    <footer class="popup-footer">
      <span class="footer-feedback" data-i18n="footer_feedback">Issues or suggestions?</span>
      <a href="https://github.com/zendegani/tweet2md/issues" target="_blank" rel="noopener noreferrer" class="footer-github" title="GitHub">
        <svg class="footer-github-icon" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>

</html>
