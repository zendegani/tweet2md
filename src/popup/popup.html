<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XClipper</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="popup-container">
    <button id="btn-settings" class="btn-settings-icon" type="button"
      data-i18n-tooltip="nav_settings" data-tooltip="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3" />
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
      </svg>
    </button>
    <header class="popup-header">
      <div class="logo-row">
        <img src="icons/icon-48.png" alt="XClipper" class="logo-icon" />
        <h1 class="logo-text">X<span class="accent">Clipper</span></h1>
      </div>
      <p class="tagline" data-i18n="tagline">Convert threads &amp; articles to Markdown</p>
      <p class="hint" data-i18n="footer_hint">Open a tweet or article on X.com to get started</p>
    </header>

    <main class="popup-main" id="view-main">
      <div class="btn-group">
        <button id="btn-download" class="btn-primary btn-action" type="button">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          <span class="btn-label" data-i18n="btn_download">Download .md</span>
        </button>
        <button id="btn-copy" class="btn-secondary btn-action" type="button">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
          </svg>
          <span class="btn-label" data-i18n="btn_copy">Copy .md</span>
        </button>
      </div>

      <div class="options">
        <div class="option-group">
          <div class="option-group-label" data-i18n="group_export">Export</div>
          <label class="toggle-label" data-tooltip="Download images to a folder next to the markdown file" data-i18n-tooltip="opt_save_images_title">
            <span class="toggle-text">
              <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <polyline points="21 15 16 10 5 21" />
              </svg>
              <span data-i18n="opt_save_images">Save images locally</span>
            </span>
            <input type="checkbox" id="chk-download-images" class="toggle-input" />
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-label" data-tooltip="Render likes, reposts, replies, bookmarks, and views as a row in the Markdown body" data-i18n-tooltip="opt_inline_stats_title">
            <span class="toggle-text">
              <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
              </svg>
              <span data-i18n="opt_inline_stats">Show engagement stats inline</span>
            </span>
            <input type="checkbox" id="chk-inline-stats" class="toggle-input" />
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-label" data-tooltip="Add likes, reposts, views as YAML frontmatter" data-i18n-tooltip="opt_metadata_title">
            <span class="toggle-text">
              <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
              </svg>
              <span data-i18n="opt_metadata">Include metadata</span>
            </span>
            <input type="checkbox" id="chk-include-metadata" class="toggle-input" />
            <span class="toggle-switch"></span>
          </label>
        </div>
      </div>

      <div class="action-row">
        <button id="btn-pdf" class="btn-pdf btn-action" type="button"
          data-tooltip="Generate a formatted PDF export with current settings, then choose where to save it."
          data-i18n-tooltip="btn_pdf_hint">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <text x="7.5" y="18" font-size="6" font-weight="700" fill="currentColor" stroke="none">PDF</text>
          </svg>
          <span class="btn-label" data-i18n="btn_pdf">Export .pdf</span>
        </button>

        <button id="btn-obsidian" class="btn-obsidian btn-action" type="button"
          data-tooltip="Configure vault, subfolder, and frontmatter fields in Settings. Use the 'Download .md' button for long threads or images."
          data-i18n-tooltip="btn_obsidian_hint">
          <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
            <path d="M19.355 18.538a68.967 68.959 0 0 0 1.858-2.954.81.81 0 0 0-.062-.9c-.516-.685-1.504-2.075-2.042-3.362-.553-1.321-.636-3.375-.64-4.377a1.707 1.707 0 0 0-.358-1.05l-3.198-4.064a3.744 3.744 0 0 1-.076.543c-.106.503-.307 1.004-.536 1.5-.134.29-.29.6-.446.914l-.31.626c-.516 1.068-.997 2.227-1.132 3.59-.124 1.26.046 2.73.815 4.481.128.011.257.025.386.044a6.363 6.363 0 0 1 3.326 1.505c.916.79 1.744 1.922 2.415 3.5zM8.199 22.569c.073.012.146.02.22.02.78.024 2.095.092 3.16.29.87.16 2.593.64 4.01 1.055 1.083.316 2.198-.548 2.355-1.664.114-.814.33-1.735.725-2.58l-.01.005c-.67-1.87-1.522-3.078-2.416-3.849a5.295 5.295 0 0 0-2.778-1.257c-1.54-.216-2.952.19-3.84.45.532 2.218.368 4.829-1.425 7.531zM5.533 9.938c-.023.1-.056.197-.098.29L2.82 16.059a1.602 1.602 0 0 0 .313 1.772l4.116 4.24c2.103-3.101 1.796-6.02.836-8.3-.728-1.73-1.832-3.081-2.55-3.831zM9.32 14.01c.615-.183 1.606-.465 2.745-.534-.683-1.725-.848-3.233-.716-4.577.154-1.552.7-2.847 1.235-3.95.113-.235.223-.454.328-.664.149-.297.288-.577.419-.86.217-.47.379-.885.46-1.27.08-.38.08-.72-.014-1.043-.095-.325-.297-.675-.68-1.06a1.6 1.6 0 0 0-1.475.36l-4.95 4.452a1.602 1.602 0 0 0-.513.952l-.427 2.83c.672.59 2.328 2.316 3.335 4.711.09.21.175.43.253.653z" />
          </svg>
          <span class="btn-label" data-i18n="btn_obsidian">Add to Obsidian</span>
        </button>
      </div>

      <div id="status" class="status hidden"></div>
    </main>

    <main class="popup-main hidden" id="view-settings">
      <div class="settings-topbar">
        <button id="btn-back" class="nav-link nav-back" type="button">
          <span class="nav-arrow">←</span>
          <span data-i18n="nav_back">Back</span>
        </button>
        <span class="settings-help-wrap">
          <button type="button" id="btn-settings-help" class="settings-help-icon"
            aria-label="Hover over labels for more info" data-i18n-aria-label="settings_help"
            aria-describedby="settings-help-hint">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="16" x2="12" y2="12" />
              <line x1="12" y1="8" x2="12.01" y2="8" />
            </svg>
          </button>
          <div id="settings-help-hint" class="settings-help-hint" role="tooltip" data-i18n="settings_help">Hover over labels for more info</div>
        </span>
      </div>

      <div class="options">
        <details class="option-group" data-section-id="downloads">
          <summary class="option-group-summary">
            <span class="option-group-label" data-i18n="group_downloads">Downloads</span>
            <svg class="option-group-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </summary>
          <label class="field-label" data-tooltip="Save Markdown and images under this subfolder inside your Downloads folder. Leave blank to save directly in Downloads." data-i18n-tooltip="opt_download_folder_title">
            <span class="field-text" data-i18n="opt_download_folder">Subfolder</span>
            <input type="text" id="txt-download-folder" class="field-input" autocomplete="off" spellcheck="false" placeholder="e.g. xclipper" data-i18n-placeholder="opt_download_folder_placeholder" />
          </label>
          <label class="field-label field-label-stacked">
            <span class="field-text">
              <span data-i18n="opt_filename_template">Filename template</span>
              <span class="field-info-wrap">
                <button type="button" id="btn-filename-info" class="field-info" aria-expanded="false"
                  aria-controls="filename-template-hint" aria-label="Show filename template placeholders"
                  data-i18n-aria-label="opt_filename_template_info">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="16" x2="12" y2="12" />
                    <line x1="12" y1="8" x2="12.01" y2="8" />
                  </svg>
                </button>
                <div id="filename-template-hint" class="field-hint" role="tooltip">
                  <div class="field-hint-title" data-i18n="opt_filename_template_hint_title">Placeholders</div>
                  <ul class="field-hint-list">
                    <li><code>{date}</code><span data-i18n="opt_filename_hint_date">publish date (YYYY-MM-DD)</span></li>
                    <li><code>{datetime}</code><span data-i18n="opt_filename_hint_datetime">publish date + time</span></li>
                    <li><code>{handle}</code><span data-i18n="opt_filename_hint_handle">author handle without @</span></li>
                    <li><code>{author}</code><span data-i18n="opt_filename_hint_author">author display name</span></li>
                    <li><code>{id}</code><span data-i18n="opt_filename_hint_id">tweet ID</span></li>
                    <li><code>{slug}</code><span data-i18n="opt_filename_hint_slug">short text preview</span></li>
                    <li><code>{type}</code><span data-i18n="opt_filename_hint_type">tweet / thread / article</span></li>
                  </ul>
                </div>
              </span>
            </span>
            <input type="text" id="txt-filename-template" class="field-input" autocomplete="off" spellcheck="false" placeholder="{handle}-{id}.md" data-i18n-placeholder="opt_filename_template_placeholder" />
          </label>
          <div class="field-preview">
            <span class="field-preview-label" data-i18n="opt_filename_preview">Preview:</span>
            <code id="filename-preview" class="field-preview-value"></code>
          </div>
        </details>

        <details class="option-group" data-section-id="obsidian">
          <summary class="option-group-summary">
            <span class="option-group-label" data-i18n="group_obsidian">Obsidian</span>
            <svg class="option-group-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </summary>
          <label class="toggle-label toggle-obsidian" data-tooltip="Emit frontmatter optimized for Obsidian: wikilink author, tags, published/created dates" data-i18n-tooltip="opt_obsidian_friendly_title">
            <span class="toggle-text">
              <svg class="toggle-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
                <path d="M19.355 18.538a68.967 68.959 0 0 0 1.858-2.954.81.81 0 0 0-.062-.9c-.516-.685-1.504-2.075-2.042-3.362-.553-1.321-.636-3.375-.64-4.377a1.707 1.707 0 0 0-.358-1.05l-3.198-4.064a3.744 3.744 0 0 1-.076.543c-.106.503-.307 1.004-.536 1.5-.134.29-.29.6-.446.914l-.31.626c-.516 1.068-.997 2.227-1.132 3.59-.124 1.26.046 2.73.815 4.481.128.011.257.025.386.044a6.363 6.363 0 0 1 3.326 1.505c.916.79 1.744 1.922 2.415 3.5zM8.199 22.569c.073.012.146.02.22.02.78.024 2.095.092 3.16.29.87.16 2.593.64 4.01 1.055 1.083.316 2.198-.548 2.355-1.664.114-.814.33-1.735.725-2.58l-.01.005c-.67-1.87-1.522-3.078-2.416-3.849a5.295 5.295 0 0 0-2.778-1.257c-1.54-.216-2.952.19-3.84.45.532 2.218.368 4.829-1.425 7.531zM5.533 9.938c-.023.1-.056.197-.098.29L2.82 16.059a1.602 1.602 0 0 0 .313 1.772l4.116 4.24c2.103-3.101 1.796-6.02.836-8.3-.728-1.73-1.832-3.081-2.55-3.831zM9.32 14.01c.615-.183 1.606-.465 2.745-.534-.683-1.725-.848-3.233-.716-4.577.154-1.552.7-2.847 1.235-3.95.113-.235.223-.454.328-.664.149-.297.288-.577.419-.86.217-.47.379-.885.46-1.27.08-.38.08-.72-.014-1.043-.095-.325-.297-.675-.68-1.06a1.6 1.6 0 0 0-1.475.36l-4.95 4.452a1.602 1.602 0 0 0-.513.952l-.427 2.83c.672.59 2.328 2.316 3.335 4.711.09.21.175.43.253.653z" />
              </svg>
              <span data-i18n="opt_obsidian_friendly">Obsidian-friendly frontmatter</span>
            </span>
            <input type="checkbox" id="chk-obsidian-friendly" class="toggle-input" />
            <span class="toggle-switch"></span>
          </label>
          <label class="field-label" data-tooltip="Used by the 'Add to Obsidian' button. Leave blank to let Obsidian pick the last-used vault." data-i18n-tooltip="opt_obsidian_vault_title">
            <span class="field-text" data-i18n="opt_obsidian_vault">Vault name</span>
            <input type="text" id="txt-obsidian-vault" class="field-input" autocomplete="off" spellcheck="false" placeholder="(optional)" data-i18n-placeholder="opt_obsidian_vault_placeholder" />
          </label>
          <label class="field-label" data-tooltip="Create the note inside this subfolder of the vault (e.g. Tweets or Inbox/Tweets). Leave blank to create at the vault root." data-i18n-tooltip="opt_obsidian_folder_title">
            <span class="field-text" data-i18n="opt_obsidian_folder">Subfolder</span>
            <input type="text" id="txt-obsidian-folder" class="field-input" autocomplete="off" spellcheck="false" placeholder="e.g. Tweets" data-i18n-placeholder="opt_obsidian_folder_placeholder" />
          </label>
          <label class="field-label field-label-stacked" id="obsidian-tags-label">
            <span class="field-text">
              <span class="field-text-label" data-tooltip="Comma-separated list of tags emitted in the Obsidian-friendly frontmatter. Type { to insert a placeholder." data-i18n-tooltip="opt_obsidian_tags_title" data-i18n="opt_obsidian_tags">Tags</span>
              <span class="field-info-wrap">
                <button type="button" id="btn-obsidian-tags-info" class="field-info" aria-expanded="false"
                  aria-controls="obsidian-tags-hint" aria-label="Show tag placeholders"
                  data-i18n-aria-label="opt_obsidian_tags_info">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="16" x2="12" y2="12" />
                    <line x1="12" y1="8" x2="12.01" y2="8" />
                  </svg>
                </button>
                <div id="obsidian-tags-hint" class="field-hint" role="tooltip">
                  <div class="field-hint-title" data-i18n="opt_filename_template_hint_title">Placeholders</div>
                  <ul class="field-hint-list">
                    <li><code>{date}</code><span data-i18n="opt_filename_hint_date">publish date (YYYY-MM-DD)</span></li>
                    <li><code>{datetime}</code><span data-i18n="opt_filename_hint_datetime">publish date + time</span></li>
                    <li><code>{handle}</code><span data-i18n="opt_filename_hint_handle">author handle without @</span></li>
                    <li><code>{author}</code><span data-i18n="opt_filename_hint_author">author display name</span></li>
                    <li><code>{id}</code><span data-i18n="opt_filename_hint_id">tweet ID</span></li>
                    <li><code>{slug}</code><span data-i18n="opt_filename_hint_slug">short text preview</span></li>
                    <li><code>{type}</code><span data-i18n="opt_filename_hint_type">tweet / thread / article</span></li>
                  </ul>
                </div>
              </span>
              <button type="button" id="btn-obsidian-tags-reset" class="field-inline-action" data-i18n="opt_obsidian_tags_reset">Reset</button>
            </span>
            <span class="field-with-popover">
              <input type="text" id="txt-obsidian-tags" class="field-input" autocomplete="off" spellcheck="false" placeholder="clippings, x, {type}" data-i18n-placeholder="opt_obsidian_tags_placeholder" />
              <div id="obsidian-tags-autocomplete" class="placeholder-autocomplete" role="listbox" hidden></div>
            </span>
            <div id="obsidian-tags-preview" class="tag-preview" aria-live="polite"></div>
          </label>
        </details>

        <details class="option-group fm-picker" data-section-id="frontmatter">
          <summary class="option-group-summary">
            <span class="option-group-label" data-i18n="group_frontmatter">Frontmatter fields</span>
            <span class="option-group-help" data-tooltip="Pick which entries appear in the YAML frontmatter. Selections are saved per mode." data-i18n-tooltip="opt_frontmatter_help" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="16" x2="12" y2="12" />
                <line x1="12" y1="8" x2="12.01" y2="8" />
              </svg>
            </span>
            <svg class="option-group-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="6 9 12 15 18 9" />
            </svg>
          </summary>
          <div class="fm-picker-list" data-mode="default">
            <div class="fm-picker-mode-header">
              <span class="fm-picker-mode-label" data-i18n="opt_frontmatter_mode_default">Default mode</span>
              <button type="button" class="fm-picker-select-all" data-mode="default" data-i18n="opt_frontmatter_select_all">Activate all</button>
            </div>
            <div class="fm-picker-fields">
              <label class="fm-field"><span class="fm-field-name">author</span><input type="checkbox" class="fm-field-input" data-mode="default" data-field="author"><span class="toggle-switch-mini"></span></label>
              <label class="fm-field"><span class="fm-field-name">handle</span><input type="checkbox" class="fm-field-input" data-mode="default" data-field="handle"><span class="toggle-switch-mini"></span></label>
              <label class="fm-field"><span class="fm-field-name">source</span><input type="checkbox" class="fm-field-input" data-mode="default" data-field="source"><span class="toggle-switch-mini"></span></label>
              <label class="fm-field"><span class="fm-field-name">date</span><input type="checkbox" class="fm-field-input" data-mode="default" data-field="date"><span class="toggle-switch-mini"></span></label>
              <label class="fm-field"><span class="fm-field-name">type</span><input type="checkbox" class="fm-field-input" data-mode="default" data-field="type"><span class="toggle-switch-mini"></span></label>
              <label class="fm-field"><span class="fm-field-name">likes</span><input type="checkbox" class="fm-field-input" data-mode="default" data-field="likes"><span class="toggle-switch-mini"></span></label>
              <label class="fm-field"><span class="fm-field-name">reposts</span><input type="checkbox" class="fm-field-input" data-mode="default" data-field="reposts"><span class="toggle-switch-mini"></span></label>
              <label class="fm-field"><span class="fm-field-name">replies</span><input type="checkbox" class="fm-field-input" data-mode="default" data-field="replies"><span class="toggle-switch-mini"></span></label>
              <label class="fm-field"><span class="fm-field-name">bookmarks</span><input type="checkbox" class="fm-field-input" data-mode="default" data-field="bookmarks"><span class="toggle-switch-mini"></span></label>
              <label class="fm-field"><span class="fm-field-name">views</span><input type="checkbox" class="fm-field-input" data-mode="default" data-field="views"><span class="toggle-switch-mini"></span></label>
            </div>
          </div>
          <div class="fm-picker-list" data-mode="obsidian" hidden>
            <div class="fm-picker-mode-header">
              <span class="fm-picker-mode-label" data-i18n="opt_frontmatter_mode_obsidian">Obsidian-friendly mode</span>
              <button type="button" class="fm-picker-select-all" data-mode="obsidian" data-i18n="opt_frontmatter_select_all">Activate all</button>
            </div>

              <label class="fm-field"><span class="fm-field-name">description</span><input type="checkbox" class="fm-field-input" data-mode="obsidian" data-field="description"><span class="toggle-switch-mini"></span></label>

              <label class="fm-field"><span class="fm-field-name">reposts</span><input type="checkbox" class="fm-field-input" data-mode="obsidian" data-field="reposts"><span class="toggle-switch-mini"></span></label>

            </div>
          </div>
        </details>

        <details class="option-group" data-section-id="inline">
