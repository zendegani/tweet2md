<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>tweet2md — print preview</title>
    <style>
      /* Loading skeleton. The injected fragment ships its own scoped styles. */
      body { margin: 0; background: #fff; }
      .t2m-loading {
        font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        color: #536471;
        padding: 40px;
        text-align: center;
      }
      /* Browsers default to about 0.4in margins for print. The fragment's
       * .t2m-root already has max-width:600px + auto margins, so we want
       * the printable area to be wide enough for that not to look cramped. */
      @page { size: A4; margin: 12mm; }
    </style>
  </head>
  <body>
    <div class="t2m-loading">Preparing print preview…</div>
    <script src="print.js"></script>
  </body>
</html>
