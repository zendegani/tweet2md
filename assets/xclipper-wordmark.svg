<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 96" role="img" aria-label="XClipper">
  <style>
    .x-letter { fill: #0f1419; }
    .clip-outline { fill: none; stroke: #0f1419; }
    @media (prefers-color-scheme: dark) {
      .x-letter { fill: #e7e9ea; }
      .clip-outline { stroke: #e7e9ea; }
    }
    .wordmark {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      font-weight: 800;
      font-size: 64px;
      letter-spacing: -1.5px;
    }
  </style>

  <!-- Logo -->
  <g transform="translate(8 8)">
    <defs>
      <clipPath id="xc-band-wm">
        <rect x="0" y="6" width="80" height="68"/>
      </clipPath>
    </defs>
    <g clip-path="url(#xc-band-wm)">
      <g transform="rotate(38 40 40)" stroke-width="4.7" fill="none" stroke-linecap="butt">
        <line x1="32.5" y1="-32" x2="32.5" y2="112" stroke="#1d9bf0"/>
        <line x1="40" y1="-32" x2="40" y2="112" stroke="#7C3AED"/>
        <line x1="47.5" y1="-32" x2="47.5" y2="112" stroke="#dc2626"/>
      </g>
    </g>
    <rect x="1.25" y="31.9" width="77.5" height="16.2" rx="8.1"
          class="clip-outline" stroke-width="5.6"
          transform="rotate(52 40 40)"/>
  </g>

  <!-- Wordmark text -->
  <text x="104" y="68" class="wordmark">
    <tspan class="x-letter">X</tspan><tspan fill="#1d9bf0">Clipper</tspan>
  </text>
</svg>
